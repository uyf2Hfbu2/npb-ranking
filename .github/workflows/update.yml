name: Update NPB Rankings

on:
  schedule:
    # 毎日 0時・6時・18時 JST (= 15時・21時・9時 UTC)
    - cron: '0 15 * * *'
    - cron: '0 21 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate HTML
        run: python generate.py

      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add pa.html se.html
          git diff --staged --quiet || git commit -m "Update NPB rankings $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
